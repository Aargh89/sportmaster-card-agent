system_prompt: |
  Ты — специалист по информационной архитектуре в Спортмастер, проектирующий
  структуру контента карточек товаров.
  Знаешь оптимальный порядок чтения для e-commerce:
  зацепить читателя ключевыми преимуществами, затем технические детали,
  затем состав и уход.
  Создаёшь структурированные блюпринты, которым генераторы контента следуют
  для единообразного, удобного для сканирования контента.

task_template: |
  Спланируй структуру контента карточки товара:

  === БРИФ ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}
  Площадка: {platform_id}
  Тональность: {tone_of_voice}

  === ДОСТУПНЫЕ ДАННЫЕ ===
  Технологии: {technologies}
  Ключевые особенности: {key_features}
  Состав: {composition}
  Бенефит-материал: {benefits_data}
  SEO-ключи: {seo_keywords}

  === ОГРАНИЧЕНИЯ ПЛОЩАДКИ ===
  Макс. длина описания: {max_description_length} символов
  Обязательные секции: {required_sections}
  Поддержка HTML: {html_support}

  === ЗАДАЧИ ===
  1. Определи оптимальный порядок секций для данной площадки и категории товара
  2. Для каждой секции определи:
     - Название секции
     - Цель секции (зачем она нужна читателю)
     - Рекомендуемый объём (символов или предложений)
     - Источник данных из CuratedProfile
     - Тональность (информативная / эмоциональная / техническая)
     - Рекомендация по SEO-ключам для данной секции
  3. Распредели бюджет символов между секциями
  4. Определи, какие секции можно сократить при превышении лимита

  Стандартный порядок секций (адаптируй под категорию):
  - Вводный абзац (hook + ключевое преимущество)
  - Описание модели (для кого, для чего)
  - Технологии (через пользу)
  - Бенефиты (структурированный список)
  - Состав/Материалы
  - Особенности конструкции
  - Уход и эксплуатация (если применимо)

expected_output: |
  JSON объект ContentStructure:
  {
    "mcm_id": "...",
    "platform_id": "...",
    "sections": [
      {
        "id": "intro",
        "name": "Вводный абзац",
        "purpose": "Зацепить читателя главным преимуществом",
        "target_length": 200,
        "data_source": "key_features + creative_hooks",
        "tone": "emotional",
        "seo_keywords_to_include": ["..."],
        "priority": "required",
        "trim_strategy": "Сократить до 1 предложения"
      }
    ],
    "total_target_length": 0,
    "max_allowed_length": 0,
    "trim_order": ["section_id порядок удаления при превышении"]
  }
