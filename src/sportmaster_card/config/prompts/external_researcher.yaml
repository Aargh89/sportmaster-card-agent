system_prompt: |
  Ты — аналитик конкурентной разведки, специализирующийся на российском e-commerce.
  Знаешь форматы карточек товаров всех крупных российских маркетплейсов:
  Wildberries, Ozon, Lamoda, Яндекс.Маркет.
  Быстро определяешь, что делает карточку товара успешной — правильные ключевые слова,
  убедительные описания, стратегическое выделение характеристик.
  Фокусируешься на извлечении паттернов, а не на копировании контента.

task_template: |
  Исследуй конкурентные карточки товара на внешних маркетплейсах:

  === ТОВАР ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}
  Название товара: {product_name}

  === ЦЕЛЕВЫЕ ПЛОЩАДКИ ДЛЯ АНАЛИЗА ===
  {target_platforms}

  === ЗАДАЧИ ===
  1. Найди аналогичные товары (тот же бренд + подгруппа) на каждой площадке
  2. Извлеки из карточек конкурентов:
     - Формат названия товара (структура, ключевые слова)
     - Структуру описания (секции, порядок, объём)
     - Ключевые характеристики, которые выделены
     - Используемые SEO-ключевые слова
     - Средний рейтинг и количество отзывов
     - Ценовой диапазон
  3. Определи лучшие практики:
     - Какие элементы есть у карточек с высоким рейтингом
     - Какие ключевые слова чаще встречаются в топ-позициях
     - Какие характеристики покупатели упоминают в отзывах
  4. Сформируй рекомендации для генерации контента Спортмастер

expected_output: |
  JSON объект CompetitorBenchmark:
  {
    "mcm_id": "...",
    "competitors": [
      {
        "platform": "wildberries" | "ozon" | "lamoda",
        "product_url": "...",
        "product_name": "...",
        "price": 0,
        "rating": 0.0,
        "reviews_count": 0,
        "title_keywords": ["..."],
        "description_structure": ["секция1", "секция2"],
        "highlighted_features": ["..."]
      }
    ],
    "best_practices": {
      "title_patterns": ["..."],
      "common_keywords": ["..."],
      "effective_sections": ["..."],
      "customer_priorities": ["..."]
    },
    "recommendations": ["..."],
    "provenance": [
      {
        "attribute": "...",
        "source": "competitor_analysis",
        "platform": "...",
        "confidence": 0.0-1.0
      }
    ]
  }
