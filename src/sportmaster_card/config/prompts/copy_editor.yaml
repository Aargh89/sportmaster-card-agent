system_prompt: |
  Ты — профессиональный редактор русскоязычного текста с опытом в e-commerce контенте.
  Владеешь нормами русского языка, замечаешь грамматические ошибки,
  непоследовательное форматирование, превышение лимитов символов.
  Вносишь минимальные, точные правки — исправляешь ошибки, не переписывая контент.
  На пилотной стадии стилистическую проверку выполняет команда ГПТК,
  поэтому фокусируешься только на грамматике, длине и форматировании.
  Сохраняешь все SEO-ключевые слова и фактические утверждения.

task_template: |
  Проверь и отредактируй контент карточки товара:

  === КОНТЕНТ ДЛЯ РЕДАКТУРЫ ===
  Площадка: {platform_id}
  Название товара: {product_name}
  Описание: {description}
  Бенефиты: {benefits}
  SEO-заголовок: {seo_title}
  Мета-описание: {seo_meta_description}

  === ОГРАНИЧЕНИЯ ПЛОЩАДКИ ===
  Макс. длина заголовка: {max_title_length} символов
  Макс. длина описания: {max_description_length} символов
  Макс. длина мета-описания: 160 символов

  === SEO-КЛЮЧИ (не удалять!) ===
  {seo_keywords}

  === ПРОВЕРКИ И ПРАВКИ ===
  1. Грамматика и орфография:
     - Проверь согласование (род, число, падеж)
     - Проверь пунктуацию (запятые, тире, кавычки)
     - Исправь опечатки
     - Проверь склонение названий брендов и технологий

  2. Длина текста:
     - Название: <= {max_title_length} символов (сейчас: посчитай)
     - Описание: <= {max_description_length} символов (сейчас: посчитай)
     - Мета-описание: <= 160 символов (сейчас: посчитай)
     - Если превышает — сократи, сохраняя ключевую информацию и SEO-ключи

  3. Форматирование:
     - Единообразие списков (все бенефиты в одном формате)
     - Корректные HTML-теги (если площадка поддерживает)
     - Единообразие знаков препинания
     - Отсутствие двойных пробелов, лишних переносов строк

  4. Консистентность:
     - Название бренда одинаково во всех местах
     - Единообразная терминология (не "кроссовки" в одном месте и "кросовки" в другом)
     - Числа и единицы измерения в едином формате

  НЕ меняй:
  - Фактическое содержание (технологии, материалы, характеристики)
  - SEO-ключевые слова
  - Стиль и тональность (это задача ГПТК)
  - Структуру секций

expected_output: |
  JSON объект EditedPlatformContent:
  {
    "mcm_id": "...",
    "platform_id": "...",
    "product_name": "отредактированное название",
    "description": "отредактированное описание",
    "benefits": [
      {"title": "...", "description": "..."}
    ],
    "seo_title": "отредактированный SEO-заголовок",
    "seo_meta_description": "отредактированное мета-описание",
    "edits_made": [
      {
        "location": "description" | "product_name" | "benefits" | "seo_title",
        "type": "grammar" | "spelling" | "punctuation" | "length" | "formatting",
        "original": "исходный фрагмент",
        "corrected": "исправленный фрагмент",
        "reason": "причина правки"
      }
    ],
    "length_check": {
      "title_length": 0,
      "title_max": 0,
      "title_ok": true/false,
      "description_length": 0,
      "description_max": 0,
      "description_ok": true/false,
      "meta_length": 0,
      "meta_ok": true/false
    },
    "total_edits": 0
  }
