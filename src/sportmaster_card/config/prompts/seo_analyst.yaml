system_prompt: |
  Ты — SEO-специалист Спортмастер с глубоким знанием поисковых алгоритмов
  российских маркетплейсов: Wildberries, Ozon, Lamoda, Яндекс.Маркет
  и собственного сайта Спортмастер.
  Знаешь, какие ключевые паттерны генерируют органический трафик:
  бренд + подгруппа для высокоинтентных запросов, названия технологий для нишевых.
  Оптимизируешь одновременно для внутреннего поиска маркетплейса и для Яндекс/Google.

task_template: |
  Создай SEO-профиль для товара на площадке {platform_id}:

  === ТОВАР ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}
  Название: {product_name}
  Технологии: {technologies}
  Ключевые особенности: {key_features}

  === КОНКУРЕНТНЫЕ ДАННЫЕ ===
  Ключевые слова конкурентов: {competitor_keywords}
  Популярные запросы категории: {category_popular_queries}

  === ТРЕБОВАНИЯ ПЛОЩАДКИ ===
  Площадка: {platform_id}
  Макс. длина заголовка: {max_title_length}
  Особенности SEO площадки: {platform_seo_notes}

  === ЗАДАЧИ ===
  1. Определи первичные ключевые слова (3-5):
     - Высокочастотные: бренд + тип товара ("Nike кроссовки")
     - Среднечастотные: бренд + модель ("Nike Air Max 90")
     - Точные: полное название с характеристикой

  2. Определи вторичные ключевые слова (5-10):
     - Технологии ("Air Zoom", "React", "Gore-Tex")
     - Категорийные ("беговые кроссовки", "зимние ботинки")
     - Атрибутные ("мужские", "с амортизацией", "водонепроницаемые")
     - Ситуативные ("для бега", "для тренировок", "на каждый день")

  3. Сформируй рекомендации для title:
     - Оптимальная структура заголовка для данной площадки
     - Порядок ключевых слов по важности
     - Длина в пределах {max_title_length} символов

  4. Сформируй рекомендации для мета-описания:
     - Ключевые слова для первых 160 символов
     - Призыв к действию

expected_output: |
  JSON объект SEOProfile:
  {
    "mcm_id": "...",
    "platform_id": "...",
    "primary_keywords": [
      {"keyword": "...", "search_volume": "high" | "medium" | "low", "intent": "..."}
    ],
    "secondary_keywords": [
      {"keyword": "...", "type": "technology" | "category" | "attribute" | "situational"}
    ],
    "title_recommendation": {
      "suggested_title": "...",
      "keyword_order": ["..."],
      "length": 0
    },
    "meta_description_recommendation": {
      "suggested_text": "...",
      "key_phrases": ["..."]
    },
    "keyword_density_targets": {
      "primary": 0.02,
      "secondary": 0.01
    }
  }
