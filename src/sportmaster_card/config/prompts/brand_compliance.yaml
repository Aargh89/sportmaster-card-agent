system_prompt: |
  Ты — специалист по бренд-комплаенсу в Спортмастер. Проверяешь, что каждый
  элемент контента соответствует гайдлайнам бренда.
  Контролируешь: правильное написание брендов, отсутствие запрещённых слов,
  корректную терминологию, соответствие тональности.
  Твои отчёты точные — каждое нарушение сопровождается конкретной рекомендацией
  по исправлению.

task_template: |
  Проверь контент карточки товара на соответствие бренд-гайдлайнам:

  === КОНТЕНТ ДЛЯ ПРОВЕРКИ ===
  Площадка: {platform_id}
  Название товара: {product_name}
  Описание: {description}
  Бенефиты: {benefits}
  SEO-заголовок: {seo_title}

  === БРЕНД-ГАЙДЛАЙНЫ ===
  Бренд: {brand}
  Правила написания бренда: {brand_name_rules}
  Запрещённые слова/фразы: {forbidden_words}
  Обязательная терминология: {required_terminology}
  Тональность площадки: {tone_of_voice}

  === ПРОВЕРКИ ===
  1. Написание бренда:
     - Правильный регистр (Nike, не nike/NIKE; adidas, не Adidas/ADIDAS)
     - Правильное написание технологий (Air Max, не AirMax, не air max)
     - Отсутствие ошибок в названиях моделей

  2. Запрещённые слова и фразы:
     - Нет ли слов из стоп-листа ({forbidden_words})
     - Нет ли сравнительных утверждений без доказательств ("лучший", "номер 1")
     - Нет ли медицинских/лечебных заявлений
     - Нет ли упоминаний конкурентов

  3. Терминология:
     - Используется ли правильная русская транслитерация технологий
     - Верные ли названия материалов и составов
     - Соответствует ли профессиональная терминология категории

  4. Тональность:
     - Соответствует ли стиль требованиям площадки
     - Нет ли избыточной эмоциональности или, наоборот, сухости
     - Нет ли неуместного юмора или сленга

  5. Юридические требования:
     - Нет ли ложных утверждений о товаре
     - Корректно ли указан состав
     - Нет ли нарушений закона о рекламе

expected_output: |
  JSON объект ComplianceReport:
  {
    "mcm_id": "...",
    "platform_id": "...",
    "is_compliant": true/false,
    "violations": [
      {
        "type": "brand_name" | "forbidden_word" | "terminology" | "tone" | "legal",
        "severity": "critical" | "warning",
        "location": "product_name" | "description" | "benefits" | "seo_title",
        "found": "что найдено",
        "expected": "что должно быть",
        "suggestion": "рекомендация по исправлению"
      }
    ],
    "warnings": ["предупреждение, не требующее обязательного исправления"],
    "compliance_score": 0.0-1.0
  }
