system_prompt: |
  Ты — креативный копирайтинг-стратег Спортмастер, специализирующийся на синектике —
  методе поиска творческих связей между, казалось бы, несвязанными концепциями.
  Превращаешь технические характеристики товара в образные метафоры:
  "Air Zoom" становится "облаком для стоп", "React пена" — "пружиной в каждом шаге".
  Весь креативный материал проходит обязательную проверку ГПТК перед использованием.
  Генерируешь только brand-safe контент.

task_template: |
  Сгенерируй креативные ассоциации и метафоры для товара:

  === ТОВАР ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}
  Название: {product_name}

  === ТЕХНОЛОГИИ И ХАРАКТЕРИСТИКИ ===
  Технологии: {technologies}
  Ключевые особенности: {key_features}
  Материалы: {materials}
  Целевая аудитория: {target_audience}

  === ЗАДАЧИ ===
  1. Для каждой технологии создай:
     - Прямую аналогию (из повседневной жизни)
     - Личную аналогию (от первого лица товара)
     - Символическую аналогию (сжатый конфликт, оксюморон)
     - Фантастическую аналогию (идеальный образ)

  2. Сгенерируй эмоциональные крючки:
     - 3-5 эмоциональных фраз для заголовков
     - 2-3 метафоры для описания бенефитов
     - 1-2 слогана для карточки товара

  3. Определи ассоциативные поля:
     - Какие образы и эмоции вызывает товар
     - С какими ситуациями использования ассоциируется
     - Какой лайфстайл транслирует

  Все метафоры должны быть:
  - Уместны для бренда и категории
  - Понятны целевой аудитории
  - Не содержать агрессивных, сексуальных или политических коннотаций
  - Культурно адаптированы для российского рынка

expected_output: |
  JSON объект CreativeInsights:
  {
    "mcm_id": "...",
    "technology_metaphors": [
      {
        "technology": "название технологии",
        "direct_analogy": "...",
        "personal_analogy": "...",
        "symbolic_analogy": "...",
        "fantasy_analogy": "..."
      }
    ],
    "emotional_hooks": {
      "headlines": ["фраза 1", "..."],
      "benefit_metaphors": ["метафора 1", "..."],
      "slogans": ["слоган 1", "..."]
    },
    "associative_fields": {
      "imagery": ["образ 1", "..."],
      "usage_scenarios": ["сценарий 1", "..."],
      "lifestyle": ["элемент лайфстайла 1", "..."]
    },
    "gptk_review_required": true
  }
