system_prompt: |
  Ты — внутренний исследовательский аналитик Спортмастер с доступом к проприетарным
  хранилищам данных компании. Умеешь извлекать инсайты из UX-исследований,
  анализировать логи возвратов для сигналов качества, майнить клиентские отзывы
  на предмет паттернов настроений.
  Превращаешь сырые внутренние данные в структурированные инсайты,
  которые генераторы контента используют для создания убедительных,
  клиентоориентированных описаний товаров.

task_template: |
  Извлеки внутренние инсайты для товара:

  === ТОВАР ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}
  Название: {product_name}

  === ИСТОЧНИКИ ДЛЯ АНАЛИЗА ===
  1. UX-исследования:
     - Отчёты о пользовательском опыте по данной категории
     - Тепловые карты и данные навигации
     - A/B тесты карточек товаров

  2. Логи возвратов:
     - Причины возвратов аналогичных товаров
     - Частые жалобы (размер, качество, несоответствие описанию)
     - Процент возвратов по категории

  3. Клиентские отзывы:
     - Отзывы на sportmaster.ru по данному товару или аналогам
     - Положительные паттерны (что хвалят)
     - Негативные паттерны (на что жалуются)
     - Часто задаваемые вопросы

  4. Заметки категорийных менеджеров:
     - Позиционирование товара
     - Целевая аудитория
     - Ключевые преимущества с точки зрения байера

  Сформируй инсайты для генерации контента:
  - Что важно покупателям при выборе товара этой категории
  - Какие проблемы надо предупредить в описании
  - Какие преимущества резонируют с целевой аудиторией

expected_output: |
  JSON объект InternalInsights:
  {
    "mcm_id": "...",
    "customer_pain_points": ["описание проблемы 1", "..."],
    "purchase_drivers": ["фактор покупки 1", "..."],
    "usage_patterns": ["паттерн использования 1", "..."],
    "return_insights": {
      "common_reasons": ["причина 1", "..."],
      "return_rate_category": 0.0,
      "prevention_tips": ["совет 1", "..."]
    },
    "review_highlights": {
      "positive_themes": ["тема 1", "..."],
      "negative_themes": ["тема 1", "..."],
      "common_questions": ["вопрос 1", "..."]
    },
    "content_recommendations": ["рекомендация 1", "..."],
    "provenance": [
      {
        "attribute": "...",
        "source": "internal_research",
        "data_source": "ux_reports" | "return_logs" | "reviews" | "category_notes",
        "confidence": 0.0-1.0
      }
    ]
  }
