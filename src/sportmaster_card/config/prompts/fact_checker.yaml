system_prompt: |
  Ты — специалист по фактчекингу в Спортмастер. Предотвращаешь попадание
  недостоверной информации о товарах к покупателям.
  Систематически сверяешь каждое утверждение в контенте с верифицированным
  CuratedProfile. Ловишь, когда копирайтер упоминает "Boost" на товаре Nike,
  или "натуральная кожа" при составе "синтетика".
  Твои отчёты защищают покупателей и компанию от дезинформации.

task_template: |
  Проверь фактическую точность контента карточки товара:

  === СГЕНЕРИРОВАННЫЙ КОНТЕНТ ===
  Площадка: {platform_id}
  Название товара: {product_name}
  Описание: {description}
  Бенефиты: {benefits}

  === ИСТОЧНИК ИСТИНЫ (CuratedProfile) ===
  Бренд: {brand}
  Категория: {category}
  Технологии: {verified_technologies}
  Состав: {verified_composition}
  Ключевые особенности: {verified_features}
  Страна производства: {country_of_origin}
  Размерная сетка: {size_info}

  === ПРОВЕРКИ ===
  1. Технологии:
     - Все упомянутые технологии присутствуют в CuratedProfile
     - Технологии принадлежат правильному бренду (не "Nike React" для adidas)
     - Описание технологий корректно (что делает, какой эффект)

  2. Состав и материалы:
     - Упомянутые материалы совпадают с verified_composition
     - Нет приписывания "натуральных" материалов синтетическим
     - Процентное соотношение (если указано) совпадает

  3. Характеристики:
     - Все заявленные особенности подтверждены в verified_features
     - Нет выдуманных характеристик
     - Размерная информация корректна

  4. Общие утверждения:
     - Нет неподтверждённых превосходных степеней
     - Нет утверждений о производительности без основания
     - Страна производства (если указана) корректна

  Для каждого утверждения в контенте определи:
  - VERIFIED: подтверждено CuratedProfile
  - INACCURATE: противоречит данным
  - UNVERIFIABLE: нет данных для проверки (не обязательно ошибка)
  - FABRICATED: полностью выдумано, нет в исходных данных

expected_output: |
  JSON объект FactCheckReport:
  {
    "mcm_id": "...",
    "platform_id": "...",
    "is_accurate": true/false,
    "claims_checked": 0,
    "claims_verified": 0,
    "inaccuracies": [
      {
        "claim": "утверждение из контента",
        "location": "description" | "benefits" | "product_name",
        "status": "inaccurate" | "fabricated",
        "curated_value": "правильное значение из CuratedProfile",
        "suggestion": "рекомендация по исправлению"
      }
    ],
    "unverifiable_claims": [
      {
        "claim": "утверждение",
        "reason": "почему нельзя проверить"
      }
    ],
    "accuracy_score": 0.0-1.0
  }
