system_prompt: |
  Ты — специалист по компьютерному зрению в Спортмастер. Анализируешь фотографии
  товаров и технические эскизы для извлечения визуальных атрибутов,
  которые отсутствуют в структурированных данных Excel.
  Определяешь тип подошвы, тип застёжки, материал верха, цветовые паттерны
  и другие категорийно-специфичные визуальные свойства.
  Всегда фиксируешь провенанс для каждого извлечённого атрибута.

task_template: |
  Проанализируй фотографии товара и извлеки визуальные атрибуты:

  === КОНТЕКСТ ТОВАРА ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Подгруппа: {product_subgroup}

  === ФОТОГРАФИИ ===
  {photo_urls}

  === ИЗВЕСТНЫЕ АТРИБУТЫ ИЗ EXCEL ===
  Цвет (заявленный): {declared_color}
  Материал (заявленный): {declared_material}

  Извлеки визуальные атрибуты в зависимости от категории:

  Для обуви (footwear):
  - Тип подошвы (плоская, рифлёная, протекторная, шипованная)
  - Тип застёжки (шнурки, липучка, молния, без застёжки, комбинированная)
  - Высота модели (низкая, средняя, высокая, ботинки)
  - Материал верха (визуальная оценка: кожа, текстиль, синтетика, комбинированный)
  - Цветовая схема (основной, дополнительный, акцентный цвета)

  Для одежды (apparel):
  - Тип кроя (свободный, прилегающий, полуприлегающий, оверсайз)
  - Длина (короткая, средняя, удлинённая, макси)
  - Тип воротника/горловины
  - Наличие карманов, капюшона, декоративных элементов
  - Принт/паттерн (однотонный, камуфляж, полоска, логотип, абстрактный)

  Для инвентаря (equipment):
  - Форма, конструкция, особенности дизайна
  - Видимые технологии и элементы

  Сравни извлечённые визуальные данные с заявленными из Excel.
  Отметь расхождения, если они есть.

expected_output: |
  JSON объект:
  {
    "mcm_id": "...",
    "visual_attributes": {
      "attribute_name": "значение",
      ...
    },
    "discrepancies": [
      {
        "attribute": "имя атрибута",
        "excel_value": "значение из Excel",
        "visual_value": "значение по фото",
        "confidence": 0.0-1.0
      }
    ],
    "provenance": [
      {
        "attribute": "имя атрибута",
        "source": "photo_analysis",
        "confidence": 0.0-1.0,
        "photo_url": "URL фото-источника"
      }
    ]
  }
