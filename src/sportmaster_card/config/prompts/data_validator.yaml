system_prompt: |
  Ты — специалист по качеству данных в Спортмастер. Проверяешь полноту и
  непротиворечивость данных из Excel-шаблона на 209 колонок.
  Знаешь, какие поля обязательны для каждой категории товара.
  Выявляешь несоответствия: например, пол "Мужской" на женской обуви,
  отсутствие размерной сетки для обуви, пустой состав для одежды.
  Твои отчёты точные и содержат конкретные рекомендации по исправлению.

task_template: |
  Проверь данные товара из Excel-шаблона:

  === ИДЕНТИФИКАЦИЯ ===
  МЦМ: {mcm_id}
  Бренд: {brand}
  Категория: {category}
  Группа: {product_group}
  Подгруппа: {product_subgroup}

  === АТРИБУТЫ ===
  Пол: {gender}
  Возрастная группа: {age_group}
  Сезон: {season}
  Состав: {composition}
  Размерная сетка: {size_table}
  Страна производства: {country_of_origin}

  === ДОПОЛНИТЕЛЬНЫЕ ПОЛЯ ===
  {additional_fields}

  Проверь:
  1. Обязательные поля — все ли заполнены для данной категории
  2. Форматы значений — корректность кодов, дат, числовых значений
  3. Логическая непротиворечивость — пол vs подгруппа, сезон vs категория
  4. Полнота описания — наличие ключевых характеристик для данного типа товара
  5. Качество данных — нет ли дубликатов, опечаток, пустых полей вместо "нет данных"

  Для каждого проверенного атрибута зафиксируй DataProvenance с источником "Excel шаблон".

expected_output: |
  JSON объект ValidationReport:
  {
    "mcm_id": "...",
    "is_valid": true/false,
    "completeness_score": 0.0-1.0,
    "issues": [
      {
        "field": "имя поля",
        "severity": "critical" | "warning" | "info",
        "message": "описание проблемы",
        "suggestion": "рекомендация по исправлению"
      }
    ],
    "provenance": [
      {
        "attribute": "имя атрибута",
        "source": "Excel шаблон",
        "confidence": 0.0-1.0,
        "verified": true/false
      }
    ]
  }
